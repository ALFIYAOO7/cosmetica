<!-- ── PRODUCT SCAN TAB ── -->
<div id="tab-product" class="tab-content active">

  <div class="upload-card">
    <div class="upload-inner">
      <div class="upload-icon">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
          <circle cx="20" cy="20" r="19" stroke="currentColor" stroke-width="1.2" stroke-dasharray="3 3" />
          <path d="M20 13v14M13 20h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
        </svg>
      </div>
      <p class="upload-title">Enter product name</p>
      <p class="upload-sub">Type the brand and product name for a full safety analysis</p>
      <div style="width:100%;max-width:400px;margin:0 auto">
        <input type="text" id="product-name-input" placeholder="e.g. Lakme CC Cream, Maybelline Lipstick..."
          style="width:100%;padding:12px 20px;border:1px solid var(--border);border-radius:50px;font-family:'DM Sans',sans-serif;font-size:14px;background:var(--warm-white);color:var(--text);outline:none;margin-bottom:16px;text-align:center" />
        <div style="text-align:center">
          <button class="btn btn-primary" id="product-analyze-btn">
            <span class="btn-text">Analyse Product</span>
            <span class="btn-icon">→</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="loading-state hidden" id="product-loading">
    <div class="loading-orb"></div>
    <p class="loading-text">Analysing ingredients<span class="dots"></span></p>
    <p class="loading-sub">Reading every compound, checking safety databases</p>
  </div>

  <div class="results hidden" id="product-results"></div>

</div>
